<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon compte — Cooked</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    /* ── Auth form ── */
    .auth-wrap {
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--gap-xl) var(--gap-md);
      background: var(--wg-10);
    }
    .auth-card {
      background: #fff;
      border: 1px solid var(--wg-20);
      border-radius: var(--r-xl);
      padding: var(--gap-2xl);
      width: 100%;
      max-width: 420px;
    }
    .auth-card__logo { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; color: var(--brown-90); margin-bottom: var(--gap-sm); }
    .auth-card__logo span { color: var(--brown-30); }
    .auth-card__sub { color: var(--wg-60); font-size: 15px; margin-bottom: var(--gap-xl); }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--wg-20); margin-bottom: var(--gap-xl); }
    .auth-tab {
      flex: 1;
      text-align: center;
      padding: var(--gap-sm) 0;
      font-size: 14px;
      font-weight: 600;
      color: var(--wg-50);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .auth-tab.active { color: var(--brown-90); border-color: var(--brown-90); }
    .auth-form { display: flex; flex-direction: column; gap: var(--gap-md); }
    .auth-error {
      background: #fff0f0;
      border: 1px solid #fcd0d0;
      border-radius: var(--r-md);
      padding: var(--gap-sm) var(--gap-md);
      font-size: 13px;
      color: var(--error);
      display: none;
    }
    .auth-error.show { display: block; }

    /* ── Dashboard ── */
    .account-layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: var(--gap-xl);
      align-items: start;
    }
    .account-sidebar {
      background: #fff;
      border: 1px solid var(--wg-20);
      border-radius: var(--r-lg);
      overflow: hidden;
      position: sticky;
      top: calc(var(--nav-h) + var(--gap-lg));
    }
    .account-sidebar__header {
      padding: var(--gap-lg);
      background: var(--wg-10);
      border-bottom: 1px solid var(--wg-20);
      display: flex;
      align-items: center;
      gap: var(--gap-md);
    }
    .account-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--brown-90);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: var(--cream);
      flex-shrink: 0; font-weight: 700;
    }
    .account-sidebar__name { font-weight: 600; font-size: 15px; color: var(--brown-90); }
    .account-sidebar__email { font-size: 12px; color: var(--wg-60); }
    .account-nav { padding: var(--gap-sm); }
    .account-nav-link {
      display: flex; align-items: center; gap: var(--gap-sm);
      padding: 10px 12px; border-radius: var(--r-md);
      font-size: 14px; font-weight: 500; color: var(--wg-70);
      cursor: pointer; transition: background .1s, color .1s;
      text-decoration: none; border: none; background: none;
      width: 100%; text-align: left;
    }
    .account-nav-link:hover { background: var(--wg-10); color: var(--brown-90); }
    .account-nav-link.active { background: var(--wg-10); color: var(--brown-90); font-weight: 600; }
    .account-nav-link i { font-size: 16px; }
    .account-nav-sep { height: 1px; background: var(--wg-20); margin: var(--gap-sm) 0; }
    .account-panel { display: none; }
    .account-panel.active { display: block; }
    .panel-title { font-family: var(--font-serif); font-size: 26px; font-weight: 700; margin-bottom: var(--gap-xl); }

    .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--gap-md); }
    .fav-card { background: #fff; border: 1px solid var(--wg-20); border-radius: var(--r-lg); overflow: hidden; }
    .fav-card__thumb { height: 100px; background: var(--wg-10); display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .fav-card__thumb img { width: 100%; height: 100%; object-fit: cover; }
    .fav-card__body { padding: var(--gap-md); }
    .fav-card__name { font-size: 14px; font-weight: 600; margin-bottom: var(--gap-sm); }
    .fav-card__actions { display: flex; gap: var(--gap-sm); }

    .settings-section { background: #fff; border: 1px solid var(--wg-20); border-radius: var(--r-lg); overflow: hidden; margin-bottom: var(--gap-lg); }
    .settings-section__header { padding: var(--gap-md) var(--gap-lg); border-bottom: 1px solid var(--wg-20); font-weight: 600; font-size: 15px; }
    .settings-section__body { padding: var(--gap-lg); display: flex; flex-direction: column; gap: var(--gap-md); }
    .settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-md); }

    .empty-panel { text-align: center; padding: var(--gap-3xl) 0; color: var(--wg-50); }
    .empty-panel i { font-size: 48px; display: block; margin-bottom: var(--gap-md); }

    .badge--premium-full {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--brown-90); color: var(--cream);
      padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 600;
    }

    @media (max-width: 768px) {
      .account-layout { grid-template-columns: 1fr; }
      .account-sidebar { position: static; }
      .account-nav { display: flex; overflow-x: auto; padding: var(--gap-sm); gap: var(--gap-xs); }
      .account-nav-sep { display: none; }
      .account-nav-link { white-space: nowrap; flex-shrink: 0; }
      .settings-row { grid-template-columns: 1fr; }
      .auth-card { padding: var(--gap-xl) var(--gap-lg); }
    }
  </style>
</head>
<body>

<div id="nav-placeholder"></div>

<main id="main-content">
  <!-- Contenu injecté par JS selon l'état de connexion -->
  <div style="display:flex;align-items:center;justify-content:center;min-height:50vh">
    <i class="ti ti-loader-2" style="font-size:32px;color:var(--wg-40);animation:spin 1s linear infinite"></i>
  </div>
</main>

<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/auth.js"></script>
<script src="js/nav.js"></script>
<script>
const main = document.getElementById('main-content');

const IMGS = {
  "bolognaise":"tagliatelle-bolognaise","crepes":"crepes","pancakes":"pancakes",
  "pain-perdu":"pain-perdu","creme-brulee":"creme-brulee"
};

async function init() {
  const { data: { session } } = await window._sb.auth.getSession();
  if (!session) {
    showAuthForm();
  } else {
    showDashboard(session.user);
  }
}

/* ── Formulaire connexion / inscription ── */
function showAuthForm() {
  document.title = 'Connexion — Cooked';
  main.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-card__logo">Cooked<span>.</span></div>
        <div class="auth-card__sub">Accédez à toutes vos recettes</div>
        <div class="auth-tabs">
          <div class="auth-tab active" id="tab-login" onclick="switchTab('login')">Connexion</div>
          <div class="auth-tab" id="tab-register" onclick="switchTab('register')">Créer un compte</div>
        </div>
        <div id="auth-error" class="auth-error"></div>

        <!-- Connexion -->
        <form class="auth-form" id="form-login" onsubmit="handleLogin(event)">
          <div class="form-group">
            <label class="form-label" for="login-email">Adresse e-mail</label>
            <input type="email" id="login-email" class="form-input" placeholder="votre@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="login-pwd">Mot de passe</label>
            <input type="password" id="login-pwd" class="form-input" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn--primary btn--md" id="btn-login">Se connecter</button>
        </form>

        <!-- Inscription -->
        <form class="auth-form" id="form-register" style="display:none" onsubmit="handleRegister(event)">
          <div class="form-group">
            <label class="form-label" for="reg-email">Adresse e-mail</label>
            <input type="email" id="reg-email" class="form-input" placeholder="votre@email.com" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-pwd">Mot de passe</label>
            <input type="password" id="reg-pwd" class="form-input" placeholder="8 caractères minimum" required minlength="8" oninput="updateStrength(this.value)">
            <div id="pwd-strength-bar" style="margin-top:6px;height:4px;border-radius:2px;background:var(--wg-20);overflow:hidden">
              <div id="pwd-strength-fill" style="height:100%;width:0;border-radius:2px;transition:width .3s,background .3s"></div>
            </div>
            <div id="pwd-strength-label" style="font-size:12px;color:var(--wg-50);margin-top:4px"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="reg-pwd2">Confirmer le mot de passe</label>
            <input type="password" id="reg-pwd2" class="form-input" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn--primary btn--md" id="btn-register">Créer mon compte</button>
        </form>

        <!-- Succès inscription -->
        <div id="register-success" style="display:none;text-align:center;padding:var(--gap-lg) 0">
          <div style="font-size:48px;margin-bottom:var(--gap-md)">📬</div>
          <div style="font-weight:600;font-size:16px;color:var(--brown-90);margin-bottom:var(--gap-sm)">Vérifiez votre boîte mail</div>
          <p style="font-size:14px;color:var(--wg-60)">Un lien de confirmation a été envoyé à <strong id="confirm-email-display"></strong>. Cliquez sur le lien pour activer votre compte.</p>
        </div>
      </div>
    </div>`;
}

function switchTab(tab) {
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  document.getElementById('form-login').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('form-register').style.display = tab === 'register' ? 'flex' : 'none';
  document.getElementById('auth-error').classList.remove('show');
}

function showError(msg) {
  const el = document.getElementById('auth-error');
  el.textContent = msg;
  el.classList.add('show');
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Connexion…';
  const { error } = await window._sb.auth.signInWithPassword({
    email: document.getElementById('login-email').value,
    password: document.getElementById('login-pwd').value,
  });
  if (error) {
    showError('Email ou mot de passe incorrect.');
    btn.disabled = false; btn.textContent = 'Se connecter';
  } else {
    location.reload();
  }
}

function pwdScore(pwd) {
  let score = 0;
  if (pwd.length >= 8)  score++;
  if (pwd.length >= 12) score++;
  if (/[A-Z]/.test(pwd)) score++;
  if (/[0-9]/.test(pwd)) score++;
  if (/[^A-Za-z0-9]/.test(pwd)) score++;
  return score;
}

function updateStrength(pwd) {
  const score = pwdScore(pwd);
  const fill  = document.getElementById('pwd-strength-fill');
  const label = document.getElementById('pwd-strength-label');
  if (!fill) return;
  const levels = [
    { w:'20%', color:'#e05252', text:'Très faible' },
    { w:'40%', color:'#e08852', text:'Faible' },
    { w:'60%', color:'#e0c052', text:'Moyen' },
    { w:'80%', color:'#7ec052', text:'Fort' },
    { w:'100%',color:'#27AE60', text:'Très fort' },
  ];
  const lvl = levels[Math.min(score, 4)];
  fill.style.width    = pwd.length ? lvl.w : '0';
  fill.style.background = lvl.color;
  label.textContent   = pwd.length ? lvl.text : '';
  label.style.color   = lvl.color;
}

async function handleRegister(e) {
  e.preventDefault();
  const email = document.getElementById('reg-email').value;
  const pwd   = document.getElementById('reg-pwd').value;
  const pwd2  = document.getElementById('reg-pwd2').value;
  if (pwd !== pwd2) { showError('Les mots de passe ne correspondent pas.'); return; }
  if (pwdScore(pwd) < 2) { showError('Mot de passe trop faible. Ajoute des majuscules, chiffres ou symboles.'); return; }
  const btn = document.getElementById('btn-register');
  btn.disabled = true; btn.textContent = 'Création…';
  const { error } = await window._sb.auth.signUp({ email, password: pwd });
  if (error) {
    showError(error.message);
    btn.disabled = false; btn.textContent = 'Créer mon compte';
  } else {
    document.getElementById('form-register').style.display = 'none';
    document.getElementById('confirm-email-display').textContent = email;
    document.getElementById('register-success').style.display = 'block';
    document.getElementById('auth-error').classList.remove('show');
  }
}

/* ── Dashboard ── */
function showDashboard(user) {
  const email     = user.email;
  const meta      = user.user_metadata || {};
  const name      = meta.full_name || email.split('@')[0];
  const avatarUrl = meta.avatar_url || '';
  const initiale  = name[0].toUpperCase();

  const avatarHtml = avatarUrl
    ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" alt="Avatar">`
    : initiale;

  main.innerHTML = `
    <section class="section--sm">
      <div class="container">
        <div class="account-layout">
          <aside class="account-sidebar">
            <div class="account-sidebar__header">
              <div class="account-avatar" id="sidebar-avatar">${avatarHtml}</div>
              <div>
                <div class="account-sidebar__name" id="sidebar-name">${name}</div>
                <div class="account-sidebar__email">${email}</div>
              </div>
            </div>
            <nav class="account-nav">
              <button class="account-nav-link active" data-panel="recettes">
                <i class="ti ti-chef-hat"></i>Mes recettes
              </button>
              <button class="account-nav-link" data-panel="favoris">
                <i class="ti ti-heart"></i>Mes favoris
              </button>
              <div class="account-nav-sep"></div>
              <button class="account-nav-link" data-panel="parametres">
                <i class="ti ti-settings"></i>Paramètres
              </button>
              <div class="account-nav-sep"></div>
              <button class="account-nav-link" onclick="handleLogout()">
                <i class="ti ti-logout"></i>Se déconnecter
              </button>
            </nav>
          </aside>

          <div>
            <!-- Recettes -->
            <div class="account-panel active" id="panel-recettes">
              <h1 class="panel-title">Toutes les recettes</h1>
              <p style="color:var(--wg-60);margin-bottom:var(--gap-lg)">
                <span class="badge--premium-full"><i class="ti ti-check"></i> Accès complet</span>
                &nbsp;Toutes les recettes sont débloquées pour votre compte.
              </p>
              <a href="recettes.html" class="btn btn--primary btn--md">Voir les recettes</a>
            </div>

            <!-- Favoris -->
            <div class="account-panel" id="panel-favoris">
              <h1 class="panel-title">Mes favoris</h1>
              <div class="fav-grid">
                <div class="fav-card">
                  <div class="fav-card__thumb"><img src="assets/img/tagliatelle-bolognaise.avif" alt="Bolognaise"></div>
                  <div class="fav-card__body">
                    <div class="fav-card__name">Tagliatelle bolognaise</div>
                    <div class="fav-card__actions"><a href="recette.html?id=bolognaise" class="btn btn--ghost btn--sm">Voir</a></div>
                  </div>
                </div>
                <div class="fav-card">
                  <div class="fav-card__thumb"><img src="assets/img/creme-brulee.avif" alt="Crème brûlée"></div>
                  <div class="fav-card__body">
                    <div class="fav-card__name">Crème brûlée</div>
                    <div class="fav-card__actions"><a href="recette.html?id=creme-brulee" class="btn btn--ghost btn--sm">Voir</a></div>
                  </div>
                </div>
                <div class="fav-card">
                  <div class="fav-card__thumb"><img src="assets/img/pancakes.avif" alt="Pancakes"></div>
                  <div class="fav-card__body">
                    <div class="fav-card__name">Pancakes</div>
                    <div class="fav-card__actions"><a href="recette.html?id=pancakes" class="btn btn--ghost btn--sm">Voir</a></div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Paramètres -->
            <div class="account-panel" id="panel-parametres">
              <h1 class="panel-title">Paramètres</h1>

              <div class="settings-section">
                <div class="settings-section__header">Profil</div>
                <div class="settings-section__body">
                  <!-- Avatar -->
                  <div style="display:flex;align-items:center;gap:var(--gap-lg);margin-bottom:var(--gap-md)">
                    <div id="avatar-preview" style="width:72px;height:72px;border-radius:50%;background:var(--brown-90);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:var(--cream);overflow:hidden;flex-shrink:0">
                      ${avatarUrl ? `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover" alt="Avatar">` : initiale}
                    </div>
                    <div>
                      <label class="btn btn--ghost btn--sm" style="cursor:pointer">
                        <i class="ti ti-upload"></i> Changer la photo
                        <input type="file" id="avatar-file" accept="image/*" style="display:none" onchange="handleAvatarUpload(this)">
                      </label>
                      <div style="font-size:12px;color:var(--wg-50);margin-top:6px">JPG, PNG ou WEBP · max 2 Mo</div>
                      <div id="avatar-status" style="font-size:12px;margin-top:4px"></div>
                    </div>
                  </div>
                  <!-- Nom -->
                  <div class="form-group">
                    <label class="form-label" for="profile-name">Nom affiché</label>
                    <input type="text" id="profile-name" class="form-input" value="${name}" placeholder="Votre prénom ou pseudo">
                  </div>
                  <div class="form-group">
                    <label class="form-label">Adresse e-mail</label>
                    <input type="email" class="form-input" value="${email}" disabled>
                  </div>
                  <button class="btn btn--primary btn--sm" onclick="handleSaveProfile()">Enregistrer</button>
                </div>
              </div>

              <div class="settings-section">
                <div class="settings-section__header">Changer le mot de passe</div>
                <div class="settings-section__body">
                  <div class="form-group">
                    <label class="form-label" for="pwd-new">Nouveau mot de passe</label>
                    <input type="password" id="pwd-new" class="form-input" placeholder="8 caractères minimum" minlength="8">
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="pwd-new2">Confirmer</label>
                    <input type="password" id="pwd-new2" class="form-input" placeholder="••••••••">
                  </div>
                  <button class="btn btn--primary btn--sm" onclick="handleChangePassword()">Modifier le mot de passe</button>
                </div>
              </div>

              <div style="padding:var(--gap-lg);border:1px solid #fde8e8;border-radius:var(--r-md);background:#fff9f9">
                <div style="font-weight:600;color:var(--error);margin-bottom:var(--gap-sm)">Zone de danger</div>
                <p style="font-size:14px;color:var(--wg-60);margin-bottom:var(--gap-md)">La suppression de votre compte est irréversible.</p>
                <button class="btn btn--sm" style="border:1px solid var(--error);color:var(--error)" onclick="showToast('Contactez-nous pour supprimer votre compte.')">Supprimer mon compte</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>`;

  document.querySelectorAll('.account-nav-link[data-panel]').forEach(btn => {
    btn.addEventListener('click', function () {
      document.querySelectorAll('.account-nav-link').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.account-panel').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('panel-' + this.dataset.panel).classList.add('active');
      history.replaceState(null, '', '#' + this.dataset.panel);
    });
  });

  const hash = location.hash.replace('#', '');
  if (hash && document.getElementById('panel-' + hash)) {
    document.querySelector(`[data-panel="${hash}"]`)?.click();
  }
}

async function handleAvatarUpload(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('Image trop lourde (max 2 Mo).'); return; }
  const status = document.getElementById('avatar-status');
  status.textContent = 'Upload en cours…';
  status.style.color = 'var(--wg-60)';
  const ext  = file.name.split('.').pop();
  const { data: { session } } = await window._sb.auth.getSession();
  const path = `${session.user.id}/avatar.${ext}`;
  const { error: upErr } = await window._sb.storage.from('avatars').upload(path, file, { upsert: true });
  if (upErr) { status.textContent = 'Erreur : ' + upErr.message; status.style.color = 'var(--error)'; return; }
  const { data } = window._sb.storage.from('avatars').getPublicUrl(path);
  const url = data.publicUrl + '?t=' + Date.now();
  const { error: updErr } = await window._sb.auth.updateUser({ data: { avatar_url: url } });
  if (updErr) { status.textContent = 'Erreur sauvegarde.'; status.style.color = 'var(--error)'; return; }
  // Mettre à jour l'affichage
  ['avatar-preview', 'sidebar-avatar'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" alt="Avatar">`;
  });
  status.textContent = 'Photo mise à jour !';
  status.style.color = 'var(--success)';
}

async function handleSaveProfile() {
  const name = document.getElementById('profile-name').value.trim();
  if (!name) { showToast('Le nom ne peut pas être vide.'); return; }
  const { error } = await window._sb.auth.updateUser({ data: { full_name: name } });
  if (error) { showToast('Erreur : ' + error.message); return; }
  document.getElementById('sidebar-name').textContent = name;
  showToast('Profil mis à jour !');
}

async function handleLogout() {
  await window._sb.auth.signOut();
  location.reload();
}

async function handleChangePassword() {
  const pwd = document.getElementById('pwd-new').value;
  const pwd2 = document.getElementById('pwd-new2').value;
  if (!pwd) return;
  if (pwd !== pwd2) { showToast('Les mots de passe ne correspondent pas.'); return; }
  const { error } = await window._sb.auth.updateUser({ password: pwd });
  if (error) {
    showToast('Erreur : ' + error.message);
  } else {
    showToast('Mot de passe modifié avec succès.');
    document.getElementById('pwd-new').value = '';
    document.getElementById('pwd-new2').value = '';
  }
}

init();
</script>
</body>
</html>
