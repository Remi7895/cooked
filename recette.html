<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recette — Cooked</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <style>
    .recipe-hero {
      position: relative;
      width: 100%;
      max-height: 480px;
      overflow: hidden;
      background: var(--wg-20);
    }
    .recipe-hero img {
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      display: block;
    }
    .recipe-hero__placeholder {
      width: 100%;
      height: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 96px;
      background: var(--wg-10);
    }

    .recipe-layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: var(--gap-2xl);
      padding: var(--gap-2xl) 0 var(--gap-3xl);
    }

    .recipe-header { margin-bottom: var(--gap-xl); }
    .recipe-header__tags { display: flex; gap: var(--gap-sm); flex-wrap: wrap; margin-bottom: var(--gap-md); }
    .recipe-header h1 { font-family: var(--font-serif); font-size: 2.2rem; margin-bottom: var(--gap-md); color: var(--brown-90); }
    .recipe-meta {
      display: flex;
      gap: var(--gap-lg);
      flex-wrap: wrap;
      color: var(--wg-60);
      font-size: 15px;
    }
    .recipe-meta span { display: flex; align-items: center; gap: 6px; }

    .recipe-steps { margin-top: var(--gap-xl); }
    .recipe-steps h2 { font-family: var(--font-serif); font-size: 1.4rem; margin-bottom: var(--gap-lg); color: var(--brown-90); }
    .step {
      display: flex;
      gap: var(--gap-md);
      margin-bottom: var(--gap-lg);
    }
    .step__num {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--brown-90);
      color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      margin-top: 2px;
    }
    .step__text { line-height: 1.6; color: var(--wg-80); }

    /* Sidebar */
    .recipe-sidebar { position: sticky; top: calc(var(--nav-h) + var(--gap-lg)); align-self: start; }
    .sidebar-card {
      background: var(--wg-10);
      border: 1px solid var(--wg-20);
      border-radius: var(--r-lg);
      padding: var(--gap-lg);
      margin-bottom: var(--gap-lg);
    }
    .sidebar-card h3 {
      font-family: var(--font-serif);
      font-size: 1.1rem;
      margin-bottom: var(--gap-md);
      color: var(--brown-90);
    }

    .servings-ctrl {
      display: flex;
      align-items: center;
      gap: var(--gap-md);
      margin-bottom: var(--gap-lg);
    }
    .servings-ctrl button {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1px solid var(--wg-30);
      background: #fff;
      cursor: pointer;
      font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      color: var(--brown-90);
      transition: background .15s;
    }
    .servings-ctrl button:hover { background: var(--wg-20); }
    .servings-ctrl span { font-size: 16px; font-weight: 600; min-width: 60px; text-align: center; color: var(--brown-90); }

    .ingredient-list { list-style: none; }
    .ingredient-list li {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--wg-20);
      font-size: 15px;
      color: var(--wg-80);
    }
    .ingredient-list li:last-child { border-bottom: none; }
    .ingredient-list .qty { font-weight: 600; color: var(--brown-90); }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--wg-60);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: var(--gap-lg);
      transition: color .15s;
    }
    .back-link:hover { color: var(--brown-90); }

    .not-found {
      text-align: center;
      padding: var(--gap-3xl) 0;
      color: var(--wg-50);
    }
    .not-found i { font-size: 48px; display: block; margin-bottom: var(--gap-md); }

    @media (max-width: 768px) {
      .recipe-layout { grid-template-columns: 1fr; }
      .recipe-sidebar { position: static; }
      .recipe-header h1 { font-size: 1.6rem; }
    }
  </style>
</head>

const PREMIUM_IDS = [
  "magret","ramen-maison","charlotte-fraises","sushi","tortiglioni",
  "gnocchis-core","gnocchis-chedd","flanc-mangue","wrap-tenders","cordon-bleu",
  "gnocchis-chevre","pates-cara","faux-filet","gratin-crozets","smash-burger",
  "saumon-patates","crevettes-ail","riz-saute","oeufs-saumon","ramen","conchiglies-crevettes","onion-rings"
];

(async () => {
const id = new URLSearchParams(location.search).get('id');
const recipe = RECIPES.find(r => r.id === id);
const container = document.getElementById('recipe-content');

let userHasPremium = false;
if (window._sb) {
  const { data: { session } } = await window._sb.auth.getSession();
  if (!session) { location.href = 'compte.html'; return; }
  userHasPremium = !!session.user?.app_metadata?.premium;
}

if (!recipe) {
  container.innerHTML = `
    <div class="container">
      <div class="not-found">
        <i class="ti ti-chef-hat"></i>
        <p>Recette introuvable. <a href="recettes.html">Voir toutes les recettes</a></p>
      </div>
    </div>`;
} else {
  document.title = `${recipe.name} — Cooked`;
  const isPremium = !userHasPremium && PREMIUM_IDS.includes(recipe.id);
  const img = IMGS[recipe.id];
  const time = TIMES[recipe.id] || '';
  const emoji = EMOJIS[recipe.category] || '🍽️';

  let baseServings = recipe.baseServings;
  let currentServings = baseServings;

  function qtyDisplay(qty) {
    if (!qty) return '';
    const ratio = currentServings / baseServings;
    const val = qty * ratio;
    return val % 1 === 0 ? val : val.toFixed(1);
  }

  function renderIngredients() {
    if (!recipe.ingredients) return '<p style="color:var(--wg-50);font-size:14px">Ingrédients à venir.</p>';
    return `<ul class="ingredient-list">
      ${recipe.ingredients.map(i => `
        <li>
          <span>${i.name}</span>
          <span class="qty">${i.qty ? qtyDisplay(i.qty) + ' ' + i.unit : i.unit || '—'}</span>
        </li>`).join('')}
    </ul>`;
  }

  function renderSteps() {
    if (!recipe.steps || recipe.steps.length === 0)
      return '<p style="color:var(--wg-50);font-size:14px">Étapes à venir.</p>';
    return recipe.steps.map((s, i) => `
      <div class="step">
        <div class="step__num">${i + 1}</div>
        <div class="step__text">${s}</div>
      </div>`).join('');
  }

  function render() {
    container.innerHTML = `
      <div class="recipe-hero">
        ${img
          ? `<img src="assets/img/${img}" alt="${recipe.name}">`
          : `<div class="recipe-hero__placeholder">${emoji}</div>`}
      </div>
      <div class="container">
        <div class="recipe-layout">
          <div class="recipe-main">
            <a href="recettes.html" class="back-link"><i class="ti ti-arrow-left"></i> Toutes les recettes</a>
            <div class="recipe-header">
              <div class="recipe-header__tags">
                <span class="badge badge--cat">${recipe.category}</span>
                <span class="badge badge--${recipe.taste === 'sucré' ? 'new' : 'free'}">${recipe.taste}</span>
                ${isPremium ? '<span class="badge badge--premium"><i class="ti ti-lock"></i> Premium</span>' : '<span class="badge badge--free">Gratuit</span>'}
              </div>
              <h1>${recipe.name}</h1>
              <div class="recipe-meta">
                ${time ? `<span><i class="ti ti-clock"></i> ${time}</span>` : ''}
                <span><i class="ti ti-users"></i> ${currentServings} pers.</span>
              </div>
            </div>
            <div class="recipe-steps">
              <h2>Préparation</h2>
              ${renderSteps()}
            </div>
            ${recipe.notes ? `<div style="margin-top:var(--gap-xl);background:var(--wg-10);border:1px solid var(--wg-20);border-left:3px solid var(--accent,#e85d04);border-radius:var(--r-md);padding:var(--gap-md) var(--gap-lg)"><p style="font-size:14px;color:var(--wg-70);line-height:1.6"><strong style="color:var(--brown-90)">Notes</strong><br>${recipe.notes}</p></div>` : ''}
          </div>
          <aside class="recipe-sidebar">
            <div class="sidebar-card">
              <h3>Ingrédients</h3>
              <div class="servings-ctrl">
                <button id="btn-minus" aria-label="Moins">−</button>
                <span id="servings-label">${currentServings} pers.</span>
                <button id="btn-plus" aria-label="Plus">+</button>
              </div>
              <div id="ingredients-list">${renderIngredients()}</div>
            </div>
          </aside>
        </div>
      </div>`;

    document.getElementById('btn-minus').addEventListener('click', () => {
      if (currentServings > 1) { currentServings--; updateServings(); }
    });
    document.getElementById('btn-plus').addEventListener('click', () => {
      currentServings++;
      updateServings();
    });
  }

  function updateServings() {
    document.getElementById('servings-label').textContent = currentServings + ' pers.';
    document.getElementById('ingredients-list').innerHTML = renderIngredients();
    container.querySelector('.recipe-meta span:last-child').innerHTML = `<i class="ti ti-users"></i> ${currentServings} pers.`;
  }

  render();
}
})();
</script>
