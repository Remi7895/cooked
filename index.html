<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;
  --bg1:#161616;
  --bg2:#1e1e1e;
  --bg3:#272727;
  --border:#2e2e2e;
  --text:#e8e8e8;
  --text2:#9a9a9a;
  --text3:#5e5e5e;
  --accent:#f5a623;
  --accent-bg:rgba(245,166,35,0.12);
  --red:#e05252;
  --red-bg:rgba(224,82,82,0.12);
  --blue:#52a9e0;
  --blue-bg:rgba(82,169,224,0.12);
  --green:#52c47a;
  --green-bg:rgba(82,196,122,0.12);
  --radius:10px;
  --radius-sm:7px;
  --radius-lg:14px;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100dvh;font-size:15px}
input,select,textarea,button{font:inherit;color:inherit;background:none}
input,select,textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);outline:none;transition:border-color .15s}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
button{cursor:pointer;border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 14px;background:var(--bg2);color:var(--text);transition:background .1s,border-color .1s}
button:hover{background:var(--bg3)}
button:disabled{opacity:.4;cursor:default}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
#root{max-width:720px;margin:0 auto;padding-bottom:2rem}
@media(max-width:600px){#root{padding-bottom:80px}}
</style>

function PhotoThumb({photoUrl,category,height=72}){
  const c=gc(category);
  const[err,setErr]=useState(false);
  const rad=height>100?"var(--radius-lg) var(--radius-lg) 0 0":"var(--radius) var(--radius) 0 0";
  if(photoUrl&&!err)return h("img",{src:photoUrl,onError:()=>setErr(true),style:{width:"100%",height:height+"px",objectFit:"cover",display:"block",borderRadius:rad}});
  return h("div",{style:{height:height+"px",background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:rad}},h("i",{className:"ti "+c.ic,"aria-hidden":"true",style:{fontSize:height/3+"px",color:c.t,opacity:0.4}}));
}

function Tag({bg,color,border,children}){
  return h("span",{style:{fontSize:"10px",fontWeight:600,padding:"2px 8px",borderRadius:"20px",background:bg,color,border:border||"none",letterSpacing:"0.03em",whiteSpace:"nowrap"}},children);
}

function BackBtn({onClick,label="Retour"}){
  return h("button",{onClick,style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"14px",color:"var(--text2)",background:"none",border:"none",cursor:"pointer",padding:0}},h("i",{className:"ti ti-arrow-left","aria-hidden":"true"}),label);
}

function Card({r,onOpen}){
  const[hov,setHov]=useState(false);
  const c=gc(r.category),t=gt(r.taste);
  return h("button",{onClick:()=>onOpen(r.id),onMouseEnter:()=>setHov(true),onMouseLeave:()=>setHov(false),
    style:{background:"var(--bg1)",border:`1px solid ${hov?"#3a3a3a":"var(--border)"}`,borderRadius:"var(--radius-lg)",padding:0,textAlign:"left",cursor:"pointer",width:"100%",display:"flex",flexDirection:"column",overflow:"hidden",transition:"all 0.15s",transform:hov?"translateY(-2px)":"none",boxShadow:hov?"0 4px 20px rgba(0,0,0,0.4)":"none"}},
    h(PhotoThumb,{photoUrl:r.photoUrl,category:r.category,height:90}),
    h("div",{style:{padding:"0.7rem 0.75rem",display:"flex",flexDirection:"column",gap:"7px"}},
      h("div",{style:{display:"flex",gap:"4px",flexWrap:"wrap"}},
        h(Tag,{bg:c.bg,color:c.t},r.category),
        h(Tag,{bg:t.bg,color:t.t,border:t.bd},r.taste)
      ),
      h("span",{style:{fontSize:"13px",fontWeight:500,color:"var(--text)",lineHeight:1.4}},r.name),
      !r.ingredients&&h("span",{style:{fontSize:"11px",color:"var(--text3)",display:"flex",alignItems:"center",gap:"3px"}},h("i",{className:"ti ti-sparkles","aria-hidden":"true"}),"à générer")
    )
  );
}

function XBtn({onClick}){
  return h("button",{onClick,style:{width:"30px",height:"30px",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"var(--radius-sm)",border:"1px solid var(--border)",background:"none",cursor:"pointer"}},
    h("i",{className:"ti ti-x","aria-hidden":"true",style:{fontSize:"13px",color:"var(--text2)"}}));
}

function SectionTitle({icon,children}){
  return h("h2",{style:{fontSize:"15px",fontWeight:600,marginBottom:"0.9rem",display:"flex",alignItems:"center",gap:"8px",color:"var(--text)"}},
    h("i",{className:"ti "+icon,"aria-hidden":"true",style:{color:"var(--text2)"}}),children);
}

function RecipeForm({recipe,onSave,onCancel}){
  const norm=r=>{
    if(!r)return{name:"",category:"Plat",taste:"salé",baseServings:4,photoUrl:"",ingredients:[{name:"",amount:"",unit:""}],steps:[{action:"",why:""}]};
    return{...r,
      ingredients:(r.ingredients||[{name:"",amount:"",unit:""}]).map(i=>({...i,amount:String(i.amount)})),
      steps:(r.steps||[{action:"",why:""}]).map(s=>typeof s==="string"?{action:s,why:""}:{...s})};
  };
  const[form,setForm]=useState(()=>norm(recipe));
  const[genning,setGenning]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const updI=(i,k,v)=>setForm(f=>({...f,ingredients:f.ingredients.map((x,j)=>j===i?{...x,[k]:v}:x)}));
  const addI=()=>setForm(f=>({...f,ingredients:[...f.ingredients,{name:"",amount:"",unit:""}]}));
  const remI=i=>setForm(f=>({...f,ingredients:f.ingredients.filter((_,j)=>j!==i)}));
  const updS=(i,k,v)=>setForm(f=>({...f,steps:f.steps.map((x,j)=>j===i?{...x,[k]:v}:x)}));
  const addS=()=>setForm(f=>({...f,steps:[...f.steps,{action:"",why:""}]}));
  const remS=i=>setForm(f=>({...f,steps:f.steps.filter((_,j)=>j!==i)}));
  const generate=async()=>{
    if(!form.name.trim()||genning)return;
    setGenning(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,messages:[{role:"user",content:`Crée une recette maison pour "${form.name}" (${form.baseServings} personnes).\nRéponds UNIQUEMENT en JSON valide sans backticks :\n{"category":"Plat","taste":"salé","ingredients":[{"name":"Nom avec label éthique si produit animal","amount":200,"unit":"g"}],"steps":[{"action":"Faire…","why":"Car la chaleur…"}]}\nRègles: unit="" sans unité (œufs, oignons…), amount=0 pour sel/poivre, inclus Label Rouge / Bio / AOP / sans nitrites dans les noms d'ingrédients animaux.`}]})});
      const data=await res.json();
      const text=(data.content||[]).find(b=>b.type==="text")?.text||"{}";
      const p=JSON.parse(text.replace(/```json?|```/g,"").trim());
      setForm(f=>({...f,category:p.category||f.category,taste:p.taste||f.taste,
        ingredients:p.ingredients?.length?p.ingredients.map(i=>({...i,amount:String(i.amount)})):f.ingredients,
        steps:p.steps?.length?p.steps.map(s=>({action:s.action||s,why:s.why||""})):f.steps}));
    }catch(e){console.error(e);}
    setGenning(false);
  };
  const handleSave=()=>{
    if(!form.name.trim())return;
    onSave({...form,id:recipe?.id||Date.now().toString(),
      ingredients:form.ingredients.filter(i=>i.name.trim()).map(i=>({...i,amount:Number(i.amount)||0})),
      steps:form.steps.filter(s=>s.action.trim())});
  };
  const lbl=text=>h("label",{style:{fontSize:"12px",color:"var(--text2)",display:"block",marginBottom:"5px",fontWeight:500}},text);
  return h("div",{style:{padding:"1.25rem 1.5rem",maxWidth:"680px"}},
    h("div",{style:{marginBottom:"1.5rem"}},h(BackBtn,{onClick:onCancel})),
    h("h1",{style:{fontSize:"20px",fontWeight:600,marginBottom:"1.5rem"}},recipe?"Modifier la recette":"Nouvelle recette"),
    h("div",{style:{marginBottom:"1rem"}},lbl("Photo (URL)"),
      h("input",{type:"url",value:form.photoUrl,onChange:e=>set("photoUrl",e.target.value),placeholder:"https://…"}),
      form.photoUrl&&h("img",{src:form.photoUrl,style:{width:"100%",height:"140px",objectFit:"cover",borderRadius:"var(--radius)",marginTop:"8px"},onError:e=>e.target.style.display="none"})
    ),
    h("div",{style:{marginBottom:"1rem"}},lbl("Nom de la recette"),
      h("input",{type:"text",value:form.name,onChange:e=>set("name",e.target.value),placeholder:"Ex : Bœuf bourguignon"})
    ),
    h("button",{onClick:generate,disabled:!form.name.trim()||genning,
      style:{marginBottom:"1.5rem",display:"flex",alignItems:"center",gap:"8px",background:"var(--accent-bg)",border:"1px solid rgba(245,166,35,0.25)",color:"var(--accent)",borderRadius:"var(--radius-sm)",padding:"9px 16px",fontWeight:500}},
      h("i",{className:`ti ${genning?"ti-loader-2":"ti-sparkles"}`,"aria-hidden":"true",style:genning?{animation:"spin 1s linear infinite"}:{}}),
      genning?"Génération en cours…":"Générer avec l'IA"
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"1rem"}},
      h("div",null,lbl("Catégorie"),h("select",{value:form.category,onChange:e=>set("category",e.target.value)},CAT_OPTS.map(c=>h("option",{key:c,value:c},c)))),
      h("div",null,lbl("Saveur"),h("select",{value:form.taste,onChange:e=>set("taste",e.target.value)},h("option",{value:"salé"},"Salé"),h("option",{value:"sucré"},"Sucré")))
    ),
    h("div",{style:{marginBottom:"1.5rem"}},lbl("Portions de base"),
      h("input",{type:"number",value:form.baseServings,onChange:e=>set("baseServings",Math.max(1,Number(e.target.value))),min:1,max:20,style:{width:"80px"}})
    ),
    h(SectionTitle,{icon:"ti-list"},"Ingrédients"),
    h("div",{style:{display:"flex",flexDirection:"column",gap:"8px",marginBottom:"0.75rem"}},
      form.ingredients.map((ing,i)=>h("div",{key:i,style:{display:"grid",gridTemplateColumns:"1fr 65px 75px 30px",gap:"6px",alignItems:"center"}},
        h("input",{type:"text",value:ing.name,onChange:e=>updI(i,"name",e.target.value),placeholder:"Ingrédient"}),
        h("input",{type:"text",value:ing.amount,onChange:e=>updI(i,"amount",e.target.value),placeholder:"Qté"}),
        h("input",{type:"text",value:ing.unit,onChange:e=>updI(i,"unit",e.target.value),placeholder:"Unité"}),
        h(XBtn,{onClick:()=>remI(i)})
      ))
    ),
    h("button",{onClick:addI,style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"13px",marginBottom:"1.5rem",color:"var(--text2)",border:"1px dashed var(--border)"}},h("i",{className:"ti ti-plus","aria-hidden":"true"}),"Ajouter un ingrédient"),
    h(SectionTitle,{icon:"ti-chef-hat"},"Étapes"),
    h("div",{style:{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"0.75rem"}},
      form.steps.map((s,i)=>h("div",{key:i,style:{background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"0.875rem"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}},
          h("span",{style:{fontSize:"12px",fontWeight:600,color:"var(--text2)"}},"Étape "+(i+1)),
          h(XBtn,{onClick:()=>remS(i)})
        ),
        h("input",{type:"text",value:s.action,onChange:e=>updS(i,"action",e.target.value),placeholder:"Action : Faire revenir…",style:{marginBottom:"6px"}}),
        h("input",{type:"text",value:s.why,onChange:e=>updS(i,"why",e.target.value),placeholder:"Pourquoi : La chaleur développe…"})
      ))
    ),
    h("button",{onClick:addS,style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"13px",marginBottom:"2rem",color:"var(--text2)",border:"1px dashed var(--border)"}},h("i",{className:"ti ti-plus","aria-hidden":"true"}),"Ajouter une étape"),
    h("div",{style:{display:"flex",gap:"10px"}},
      h("button",{onClick:handleSave,disabled:!form.name.trim(),
        style:{flex:1,fontWeight:600,padding:"12px 0",fontSize:"14px",background:"var(--accent)",color:"#000",border:"none",borderRadius:"var(--radius-sm)"}},
        recipe?"Enregistrer":"Créer la recette"),
      h("button",{onClick:onCancel,style:{padding:"12px 16px",fontSize:"14px"}},"Annuler")
    )
  );
}

function DetailView({recipe,note,generating,onBack,onEdit,onDelete,onSaveNote,onGenerate}){
  const[servings,setServings]=useState(recipe.baseServings);
  const[noteVal,setNoteVal]=useState(note||"");
  const[delConf,setDelConf]=useState(false);
  const c=gc(recipe.category),t=gt(recipe.taste);
  return h("div",{style:{padding:"1.25rem 1.5rem",maxWidth:"680px"}},
    h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"1.25rem",flexWrap:"wrap",gap:"8px"}},
      h(BackBtn,{onClick:onBack,label:"Toutes les recettes"}),
      h("div",{style:{display:"flex",gap:"8px"}},
        h("button",{onClick:onEdit,style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"13px"}},h("i",{className:"ti ti-edit","aria-hidden":"true"}),"Modifier"),
        !delConf
          ?h("button",{onClick:()=>setDelConf(true),style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"13px",color:"var(--red)",border:"1px solid rgba(224,82,82,0.3)"}},h("i",{className:"ti ti-trash","aria-hidden":"true"}),"Supprimer")
          :h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
              h("span",{style:{fontSize:"13px",color:"var(--text2)"}},"Confirmer ?"),
              h("button",{onClick:onDelete,style:{fontSize:"13px",color:"var(--red)",border:"1px solid rgba(224,82,82,0.3)"}},"Oui"),
              h("button",{onClick:()=>setDelConf(false),style:{fontSize:"13px"}},"Non")
            )
      )
    ),
    h(PhotoThumb,{photoUrl:recipe.photoUrl,category:recipe.category,height:200}),
    h("div",{style:{display:"flex",gap:"6px",margin:"1rem 0 0.5rem"}},
      h(Tag,{bg:c.bg,color:c.t},recipe.category),
      h(Tag,{bg:t.bg,color:t.t,border:t.bd},recipe.taste)
    ),
    h("h1",{style:{fontSize:"22px",fontWeight:600,lineHeight:1.3,marginBottom:"1.5rem"}},recipe.name),
    h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"0.75rem 1rem",background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:"var(--radius)",marginBottom:"2rem"}},
      h("i",{className:"ti ti-users","aria-hidden":"true",style:{color:"var(--text2)"}}),
      h("span",{style:{fontSize:"14px",color:"var(--text2)",flex:1}},"Portions"),
      h("button",{onClick:()=>setServings(s=>Math.max(1,s-1)),
        style:{width:"32px",height:"32px",borderRadius:"50%",border:"1px solid var(--border)",background:"var(--bg2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",lineHeight:1,fontWeight:300}},"−"),
      h("span",{style:{fontSize:"18px",fontWeight:600,minWidth:"32px",textAlign:"center"}},servings),
      h("button",{onClick:()=>setServings(s=>Math.min(20,s+1)),
        style:{width:"32px",height:"32px",borderRadius:"50%",border:"1px solid var(--border)",background:"var(--bg2)",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"18px",lineHeight:1,fontWeight:300}},"+")
    ),
    generating
      ?h("div",{style:{textAlign:"center",padding:"3rem 0",color:"var(--text2)"}},
          h("i",{className:"ti ti-loader-2","aria-hidden":"true",style:{fontSize:"28px",display:"block",marginBottom:"10px",animation:"spin 1s linear infinite"}}),
          h("span",{style:{fontSize:"14px"}},"Génération en cours…"))
      :!recipe.ingredients
        ?h("div",{style:{textAlign:"center",padding:"3rem 0",color:"var(--text2)"}},
            h("i",{className:"ti ti-sparkles","aria-hidden":"true",style:{fontSize:"32px",display:"block",marginBottom:"12px",color:"var(--accent)"}}),
            h("p",{style:{fontSize:"14px",marginBottom:"1rem"}},"Recette non encore générée"),
            h("button",{onClick:onGenerate,style:{background:"var(--accent-bg)",border:"1px solid rgba(245,166,35,0.25)",color:"var(--accent)",borderRadius:"var(--radius-sm)",padding:"9px 20px",fontWeight:500}},"Générer avec l'IA")
          )
        :h(React.Fragment,null,
            h(SectionTitle,{icon:"ti-list"},"Ingrédients"),
            h("div",{style:{background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden",marginBottom:"2rem"}},
              recipe.ingredients.map((ing,i)=>{
                const sc=fmt(ing.amount,recipe.baseServings,servings);
                return h("div",{key:i,style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0.7rem 1rem",borderBottom:i<recipe.ingredients.length-1?"1px solid var(--border)":"none"}},
                  h("span",{style:{fontSize:"14px",color:"var(--text)"}},ing.name),
                  sc&&h("span",{style:{fontSize:"14px",fontWeight:600,color:"var(--accent)"}},sc+(ing.unit?" "+ing.unit:""))
                );
              })
            ),
            h(SectionTitle,{icon:"ti-chef-hat"},"Préparation"),
            h("div",{style:{display:"flex",flexDirection:"column",gap:"10px",marginBottom:"2rem"}},
              recipe.steps.map((step,i)=>{
                const s=typeof step==="string"?{action:step,why:""}:step;
                return h("div",{key:i,style:{background:"var(--bg1)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"0.875rem 1rem"}},
                  h("div",{style:{display:"flex",gap:"12px"}},
                    h("span",{style:{flexShrink:0,width:"24px",height:"24px",background:"var(--accent-bg)",border:"1px solid rgba(245,166,35,0.2)",borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:700,color:"var(--accent)"}},i+1),
                    h("div",{style:{flex:1}},
                      h("p",{style:{fontSize:"14px",fontWeight:500,lineHeight:1.5,margin:s.why?"0 0 6px":"0",color:"var(--text)"}},s.action),
                      s.why&&h("p",{style:{fontSize:"13px",color:"var(--text2)",lineHeight:1.5,margin:0,fontStyle:"italic",paddingLeft:"0",borderLeft:"2px solid var(--border)",paddingLeft:"8px"}},"→ "+s.why)
                    )
                  )
                );
              })
            ),
            h("div",{style:{marginBottom:"2rem"}},
              h(SectionTitle,{icon:"ti-pencil"},"Note personnelle"),
              h("textarea",{value:noteVal,onChange:e=>setNoteVal(e.target.value),onBlur:()=>onSaveNote(noteVal),placeholder:"Astuces, variantes, notes de dégustation…",rows:4,style:{resize:"vertical"}})
            )
          )
  );
}

function ListView({recipes,onOpen,onAdd}){
  const[filter,setFilter]=useState("Tout");
  const[search,setSearch]=useState("");
  const visible=recipes.filter(r=>{
    const fc=filter==="Tout"||r.category===filter||(filter==="Salé"&&r.taste==="salé")||(filter==="Sucré"&&r.taste==="sucré");
    const fs=!search||r.name.toLowerCase().includes(search.toLowerCase());
    return fc&&fs;
  });
  return h("div",{style:{padding:"1.25rem 1.5rem"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:"10px",marginBottom:"1.25rem"}},
      h("i",{className:"ti ti-book-2","aria-hidden":"true",style:{fontSize:"22px",color:"var(--accent)"}}),
      h("h1",{style:{fontSize:"20px",fontWeight:700,margin:0,flex:1,letterSpacing:"-0.02em"}},"Mon carnet"),
      h("button",{onClick:onAdd,style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"13px",fontWeight:600,background:"var(--accent)",color:"#000",border:"none",borderRadius:"var(--radius-sm)",padding:"8px 14px"}},h("i",{className:"ti ti-plus","aria-hidden":"true"}),"Recette")
    ),
    h("div",{style:{position:"relative",marginBottom:"1rem"}},
      h("i",{className:"ti ti-search","aria-hidden":"true",style:{position:"absolute",left:"12px",top:"50%",transform:"translateY(-50%)",color:"var(--text3)",fontSize:"16px",pointerEvents:"none"}}),
      h("input",{type:"text",placeholder:"Rechercher une recette…",value:search,onChange:e=>setSearch(e.target.value),style:{paddingLeft:"38px"}})
    ),
    h("div",{style:{display:"flex",gap:"6px",overflowX:"auto",marginBottom:"1.25rem",paddingBottom:"4px",scrollbarWidth:"none"}},
      CATS.flatMap((cat,i)=>[
        ...(i===3?[h("div",{key:"sep",style:{flexShrink:0,width:"1px",margin:"0 2px",background:"var(--border)"}})]:[]),
        h("button",{key:cat,onClick:()=>setFilter(cat),
          style:{flexShrink:0,padding:"5px 13px",borderRadius:"20px",fontSize:"12px",cursor:"pointer",fontWeight:filter===cat?600:400,
            background:filter===cat?"var(--accent)":"var(--bg2)",
            color:filter===cat?"#000":"var(--text2)",
            border:`1px solid ${filter===cat?"var(--accent)":"var(--border)"}`,
            whiteSpace:"nowrap"}},cat)
      ])
    ),
    h("p",{style:{fontSize:"12px",color:"var(--text3)",marginBottom:"1rem"}},visible.length+" recette"+(visible.length>1?"s":"")),
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:"10px"}},
      visible.map(r=>h(Card,{key:r.id,r,onOpen}))
    )
  );
}

function App(){
  const[recipes,setRecipes]=useState([]);
  const[notes,setNotes]=useState({});
  const[loaded,setLoaded]=useState(false);
  const[view,setView]=useState("list");
  const[formMode,setFormMode]=useState("add");
  const[selId,setSelId]=useState(null);
  const[generating,setGenerating]=useState(false);
  useEffect(()=>{load().then(data=>{setRecipes(data?.recipes||INIT);setNotes(data?.notes||{});setLoaded(true);});},[] );
  useEffect(()=>{if(loaded)persist({recipes,notes});},[recipes,notes,loaded]);
  const selR=recipes.find(r=>r.id===selId);
  const doGenerate=async id=>{
    const r=recipes.find(x=>x.id===id);
    if(!r||r.ingredients)return;
    setGenerating(true);
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,messages:[{role:"user",content:`Crée une recette maison pour "${r.name}" (${r.baseServings} personnes).\nRéponds UNIQUEMENT en JSON valide sans backticks :\n{"ingredients":[{"name":"Nom avec label éthique si produit animal","amount":200,"unit":"g"}],"steps":[{"action":"Faire…","why":"Car la chaleur…"}]}\nRègles: unit="" sans unité, amount=0 pour sel/poivre, inclus Label Rouge/Bio/AOP/sans nitrites dans les noms d'ingrédients animaux.`}]})});
      const data=await res.json();
      const text=(data.content||[]).find(b=>b.type==="text")?.text||"{}";
      const p=JSON.parse(text.replace(/```json?|```/g,"").trim());
      setRecipes(prev=>prev.map(x=>x.id===id?{...x,...p}:x));
    }catch(e){console.error(e);}
    setGenerating(false);
  };
  const openRecipe=id=>{setSelId(id);setView("detail");doGenerate(id);};
  const saveRecipe=recipe=>{
    if(formMode==="add")setRecipes(prev=>[...prev,recipe]);
    else setRecipes(prev=>prev.map(r=>r.id===recipe.id?recipe:r));
    setSelId(recipe.id);setView("detail");
  };
  const deleteRecipe=()=>{setRecipes(prev=>prev.filter(r=>r.id!==selId));setNotes(prev=>{const n={...prev};delete n[selId];return n;});setSelId(null);setView("list");};
  const saveNote=(id,text)=>setNotes(prev=>({...prev,[id]:text}));
  if(!loaded)return h("div",{style:{textAlign:"center",padding:"3rem",color:"var(--color-text-secondary)"}},h("i",{className:"ti ti-loader","aria-hidden":"true",style:{fontSize:"24px",display:"block",marginBottom:"8px",animation:"spin 1s linear infinite"}}),h("span",{style:{fontSize:"14px"}},"Chargement…"));
  if(view==="form")return h(RecipeForm,{recipe:formMode==="edit"?selR:null,onSave:saveRecipe,onCancel:()=>setView(selId&&formMode==="edit"?"detail":"list")});
  if(view==="detail"&&selR)return h(DetailView,{recipe:recipes.find(r=>r.id===selId)||selR,note:notes[selId]||"",generating,onBack:()=>setView("list"),onEdit:()=>{setFormMode("edit");setView("form");},onDelete:deleteRecipe,onSaveNote:text=>saveNote(selId,text),onGenerate:()=>doGenerate(selId)});
  return h(ListView,{recipes,onOpen:openRecipe,onAdd:()=>{setSelId(null);setFormMode("add");setView("form");}});
}

ReactDOM.render(h(App),document.getElementById("root"));
</script>
